{% extends 'base.html' %}
{% block content %}
<h1>Панель администратора</h1>

<!-- Вкладки -->
<div style="padding: 0 40px; display:flex; gap:10px; margin-bottom:20px;">
  <a href="/admin" style="background:#111; color:#fff; padding:8px 18px;
     border-radius:8px; text-decoration:none; font-size:14px;">🛍️ Товары</a>
  <a href="/admin/orders" style="background:#f1f5f9; color:#111; padding:8px 18px;
     border-radius:8px; text-decoration:none; font-size:14px;">📦 Заказы</a>
</div>

<h2>Добавить товар</h2>
<form method="POST" enctype="multipart/form-data">
    <input type="text" name="name" placeholder="Название" required>
    <input type="number" name="price" placeholder="Цена (₽)" required>
    <input type="text" name="size" placeholder="Размеры: 42,43,44">
    <textarea name="description" placeholder="Описание"></textarea>
    <div style="padding:10px 14px; border:2px dashed #ddd; border-radius:8px; background:#fafafa;">
      <label style="cursor:pointer; color:#666;">
        📸 Фото товара:
        <input type="file" name="photo" accept="image/*" style="margin-top:8px;display:block;">
      </label>
    </div>
    <button type="submit">Добавить</button>
</form>

<h2>Товары ({{ products|length }}шт)</h2>
<div class="product-list">
{% for p in products %}
<p>
  {% if p['photo'] %}
    <img src="{{ p['photo'] }}" style="width:50px;height:50px;object-fit:cover;border-radius:8px;">
  {% else %}
    <span style="width:50px;height:50px;background:#f1f5f9;border-radius:8px;
          display:inline-flex;align-items:center;justify-content:center;">👟</span>
  {% endif %}
  <span>{{ p['name'] }}</span>
  <span style="color:#f0a500;font-weight:bold;">{{ p['price'] }} ₽</span>
  <a href="/admin/delete/{{ p['id'] }}" style="color:red;"
     onclick="return confirm('Удалить товар?')">Удалить</a>
</p>
{% endfor %}
</div>
{% endblock %}
