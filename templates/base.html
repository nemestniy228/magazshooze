<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagazShooze 👟</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav>
    <a href="/" class="nav-logo">Magaz<span>Shooze</span></a>
    <div class="nav-links">
        <a href="/">Главная</a>
        {% if session.user_id %}
            <a href="/cart" class="nav-cart">🛒 Корзина</a>
            <a href="/orders">Мои заказы</a>
            {% if session.role == 'admin' %}
            <a href="/admin">⚙️ Админка</a>
            {% endif %}
            <a href="/logout" class="nav-logout">Выйти ({{ session.user_name }})</a>
        {% else %}
            <a href="/login">Войти</a>
            <a href="/register">Регистрация</a>
        {% endif %}
    </div>
</nav>
{% block content %}{% endblock %}
</body>
</html>
